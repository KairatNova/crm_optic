services:
  db:
    image: postgres:16-alpine
    container_name: crm_optic_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_optic}
      POSTGRES_USER: ${POSTGRES_USER:-crm_optic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_optic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - crm_optic_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_optic} -d ${POSTGRES_DB:-crm_optic}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  crm_optic_pgdata:
